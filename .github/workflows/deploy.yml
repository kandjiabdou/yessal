name: CI/CD Deploy

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - "dev/**"
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-api:
    name: Test api-yessal
    runs-on: ubuntu-latest
    env:
      DATABASE_SHARED_URL: mysql://user:password@127.0.0.1:3306/dbname_shared

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js for API
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api-yessal/package-lock.json

      - name: Install shared Prisma dependencies
        working-directory: shared-database/prisma
        run: npm ci

      - name: Generate shared Prisma client
        working-directory: shared-database/prisma
        run: npm run generate

      - name: Install API dependencies
        working-directory: api-yessal
        run: npm ci

      - name: Run API tests
        working-directory: api-yessal
        run: npm test -- --runInBand

  test-manager:
    name: Test manager-app-yessal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js for manager app
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: manager-app-yessal/package-lock.json

      - name: Install manager dependencies
        working-directory: manager-app-yessal
        run: npm ci

      - name: Run manager tests
        working-directory: manager-app-yessal
        run: npm test -- --runInBand

  deploy-hpr:
    name: Deploy to HPR
    needs:
      - test-api
      - test-manager
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev/')
    runs-on: ubuntu-latest
    environment: hpr

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_ROOT }}"
            git fetch origin ${{ github.ref_name }}
            git checkout -B ${{ github.ref_name }} origin/${{ github.ref_name }}

            cd shared-database/prisma
            if [ -f .env ]; then set -a; . ./.env; set +a; fi
            export DATABASE_SHARED_URL="${DATABASE_SHARED_URL:-mysql://user:password@127.0.0.1:3306/dbname_shared}"
            npm ci
            npm run generate

            cd ../../api-yessal
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            sudo systemctl restart ${{ secrets.API_SERVICE_NAME }}

            cd ../manager-app-yessal
            npm ci
            npm run build
            sudo systemctl restart ${{ secrets.MANAGER_SERVICE_NAME }}

  deploy-prod:
    name: Deploy to production
    needs:
      - test-api
      - test-manager
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_ROOT }}"
            git fetch origin main
            git checkout -B main origin/main

            cd shared-database/prisma
            if [ -f .env ]; then set -a; . ./.env; set +a; fi
            export DATABASE_SHARED_URL="${DATABASE_SHARED_URL:-mysql://user:password@127.0.0.1:3306/dbname_shared}"
            npm ci
            npm run generate

            cd api-yessal
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            sudo systemctl restart ${{ secrets.API_SERVICE_NAME }}

            cd ../manager-app-yessal
            npm ci
            npm run build
            sudo systemctl restart ${{ secrets.MANAGER_SERVICE_NAME }}