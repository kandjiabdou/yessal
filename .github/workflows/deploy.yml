name: CI/CD Deploy

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - "dev/**"
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-api:
    name: Test api-yessal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-yessal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api-yessal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm test -- --runInBand

  test-manager:
    name: Test manager-app-yessal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manager-app-yessal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: manager-app-yessal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run manager tests
        run: npm test -- --runInBand

  deploy-hpr:
    name: Deploy to HPR
    needs:
      - test-api
      - test-manager
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev/')
    runs-on: ubuntu-latest
    environment: hpr

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_ROOT }}"
            git fetch origin dev
            git checkout -B dev origin/dev

            cd api-yessal
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            sudo systemctl restart ${{ secrets.API_SERVICE_NAME }}

            cd ../manager-app-yessal
            npm ci
            npm run build
            sudo systemctl restart ${{ secrets.MANAGER_SERVICE_NAME }}

  deploy-prod:
    name: Deploy to production
    needs:
      - test-api
      - test-manager
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_ROOT }}"
            git fetch origin main
            git checkout -B main origin/main

            cd api-yessal
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            sudo systemctl restart ${{ secrets.API_SERVICE_NAME }}

            cd ../manager-app-yessal
            npm ci
            npm run build
            sudo systemctl restart ${{ secrets.MANAGER_SERVICE_NAME }}